<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Day for You ✨</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d0a14 0%, #1b1124 50%, #2b1428 100%);
            --accent-color: #ff6584;
            --hacker-green: #00ff66;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #050508;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 1. LOADING SCREEN --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            padding: 20px;
        }

        .loader-console {
            width: 100%;
            max-width: 450px;
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid var(--hacker-green);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.2);
        }

        .console-log {
            height: 100px;
            overflow-y: hidden;
            font-size: 0.85rem;
            color: var(--hacker-green);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .progress-container {
            width: 100%;
            background: #111;
            border: 1px solid rgba(255,255,255,0.2);
            height: 25px;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00aa44, var(--hacker-green));
            box-shadow: 0 0 10px var(--hacker-green);
            transition: width 0.1s linear;
        }

        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 0.9rem;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        .btn-continue {
            display: none;
            width: 100%;
            background: var(--hacker-green);
            color: #000;
            border: none;
            padding: 12px;
            font-family: monospace;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            box-shadow: 0 0 15px var(--hacker-green);
            text-transform: uppercase;
        }

        /* --- 2. INTERFACE UTAMA --- */
        #main-interface {
            display: none;
            opacity: 0;
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            position: fixed;
            top: 0;
            left: 0;
            padding: 20px;
            transition: opacity 0.5s ease;
        }

        .card-container {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 40px 20px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0,0,0,0.5);
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(45deg, #ff6584, #ffac67);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            font-weight: 800;
        }

        .wishes-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #eee;
            margin-bottom: 30px;
        }

        .btn-mau {
            background: linear-gradient(45deg, #ff6584, #ff4b72);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 101, 132, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-mau:active {
            transform: scale(0.95);
        }

        /* --- 3. TEKS PESAN RAHASIA (DISEMBUNYIKAN AWALNYA) --- */
        #secret-message-box {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.8s ease forwards;
        }

        .secret-text {
            font-size: 0.95rem;
            color: #ffb367;
            font-style: italic;
            line-height: 1.6;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Background effects */
        #canvas-fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            display: none;
        }
        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .heart-fly {
            position: absolute;
            bottom: -50px;
            animation: floatUp 3s linear forwards;
            opacity: 0.7;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            15% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-105vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- 1. LOADING SCREEN -->
    <div id="loading-screen">
        <div class="loader-console">
            <div class="console-log" id="consoleLog"></div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            <button class="btn-continue" id="continueBtn" onclick="goToMainSystem()">LANJUTKAN ➔</button>
        </div>
    </div>

    <!-- 2. INTERFACE UTAMA -->
    <div id="main-interface">
        <canvas id="canvas-fireworks"></canvas>
        <div class="floating-bg" id="bgSpace"></div>

        <div class="card-container">
            <!-- Ucapan Selamat Ulang Tahun -->
            <h1>Selamat Ulang Tahun! 🥳✨</h1>
            <p class="wishes-text">
                Selamat hari spesial ya! Semoga panjang umur, sehat selalu, dilancarkan semua urusan kuliahnya, dan selalu dipenuhi kebahagiaan setiap hari. 💖
            </p>
            
            <!-- Satu-satunya Tombol yang Tersedia -->
            <div id="action-box">
                <button class="btn-mau" id="btnMau" onclick="showSecretMessage()">Mau 🥰</button>
            </div>

            <!-- 3. PESAN AKHIR YANG MUNCUL SETELAH DIKLIK -->
            <div id="secret-message-box">
                <p class="secret-text">
                    "Maaf ya kalau maksa soalnya kamu susah dikejar 🏃💨<br>
                    Tapi intinya tetep tulus kok, pokoknya wishes you all the best! 🎈"
                </p>
            </div>
        </div>
    </div>

    <script>
        // --- PROSES LOADING LOG ---
        const consoleLog = document.getElementById('consoleLog');
        const logs = [
            "[START] Menyiapkan paket kebahagiaan...",
            "[LOAD] Menyusun barisan kata-kata tulus...",
            "[SYSTEM] Membuka proteksi memori indah...",
            "[SUCCESS] Sistem siap dijalankan!"
        ];

        let logIndex = 0;
        function printLogs() {
            if(logIndex < logs.length) {
                consoleLog.innerHTML += logs[logIndex] + "<br>";
                logIndex++;
                setTimeout(printLogs, 400);
            }
        }
        printLogs();

        // --- PROGRESS BAR CONTROL ---
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const continueBtn = document.getElementById('continueBtn');
        let progress = 0;

        function updateLoading() {
            if (progress < 100) {
                progress += Math.floor(Math.random() * 8) + 4;
                if(progress > 100) progress = 100;
                progressBar.style.width = progress + '%';
                progressText.innerText = progress + '%';
                setTimeout(updateLoading, 80);
            } else {
                consoleLog.innerHTML += "<span style='color:#fff;'><br>[READY] Klik tombol di bawah untuk masuk...</span>";
                continueBtn.style.display = "block";
            }
        }
        updateLoading();

        // --- MASUK KE HALAMAN UTAMA ---
        function goToMainSystem() {
            document.getElementById('loading-screen').style.display = 'none';
            const mainInt = document.getElementById('main-interface');
            mainInt.style.display = 'flex';
            setTimeout(() => { mainInt.style.opacity = '1'; }, 50);
        }

        // --- AKSI KETIKA TOMBOL MAU DIKLIK ---
        function showSecretMessage() {
            // Sembunyikan atau nonaktifkan tombol mau agar tidak diklik dua kali
            document.getElementById('btnMau').style.transform = 'scale(0.9)';
            document.getElementById('btnMau').style.opacity = '0.7';
            document.getElementById('btnMau').disabled = true;

            // Memunculkan blok pesan "Maaf ya..."
            document.getElementById('secret-message-box').style.display = 'block';

            // Nyalakan efek kembang api dan ledakan hati
            startEffects();
        }

        // --- EFEK TAMBAHAN (KEMBANG API & HATI) ---
        const bgSpace = document.getElementById('bgSpace');
        const canvas = document.getElementById('canvas-fireworks');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function startEffects() {
            canvas.style.display = "block";
            animateFireworks();
            autoLaunchFireworks();
            setInterval(spawnHeart, 300);
        }

        function spawnHeart() {
            const emojies = ['💖', '❤️', '✨', '🎈'];
            const heart = document.createElement('div');
            heart.className = 'heart-fly';
            heart.innerText = emojies[Math.floor(Math.random() * emojies.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            bgSpace.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 3000);
        }

        let particles = [];
        function createFirework(x, y) {
            const colors = ['#ff6584', '#ffac67', '#00ff66', '#4ad3ff', '#b57cff'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    alpha: 1,
                    color: color
                });
            }
        }

        function animateFireworks() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.vy += 0.04; p.alpha -= 0.02;
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();
                if (p.alpha <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animateFireworks);
        }

        function autoLaunchFireworks() {
            createFirework(Math.random() * canvas.width, Math.random() * (canvas.height * 0.5));
            setTimeout(autoLaunchFireworks, 600);
        }
    </script>
</body>
</html>
